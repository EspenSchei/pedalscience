<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Example road cyclist power illustration</title>
  <desc id="desc">Stylized road cyclist in an aggressive position with power meter inspired overlays and watt graphics.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="790" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.55" stop-color="#0F1F38"/>
      <stop offset="1" stop-color="#09131F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 184) rotate(44.5) scale(242 209)">
      <stop stop-color="#38BDF8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(726 532) rotate(140.9) scale(260 228)">
